    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const imgPreview = document.getElementById('img-preview');
        const fileNameDisplay = document.getElementById('file-name');
        const fileSizeDisplay = document.getElementById('file-size');
        const downloadBtn = document.getElementById('download-btn');
        let compressedFileBlob = null;

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFileLoad(e.target.files[0]));

        async function handleFileLoad(file) {
            if (!file || !file.type.startsWith('image/')) return;
            previewContainer.style.display = 'block';
            fileNameDisplay.innerText = file.name;
            fileSizeDisplay.innerText = `Original: ${(file.size / 1024 / 1024).toFixed(2)} MB`;
            imgPreview.src = URL.createObjectURL(file);
            
            try {
                compressedFileBlob = await imageCompression(file, { maxSizeMB: 1, maxWidthOrHeight: 1920 });
                downloadBtn.innerText = `DOWNLOAD COMPRESSED (${(compressedFileBlob.size / 1024 / 1024).toFixed(2)} MB)`;
            } catch (e) { alert("Compression failed."); }
        }

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(compressedFileBlob);
            link.download = `compressed_${fileNameDisplay.innerText}`;
            link.click();
        });
